name: CI

on:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  validate:
    name: Validate custom component
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Compile integration
        run: python -m compileall -q custom_components/directional_rf_fan

      - name: Verify RF protocols API
        run: |
          python - <<'PY'
          import json
          import subprocess
          import sys

          with open("custom_components/directional_rf_fan/manifest.json") as file:
              requirements = json.load(file)["requirements"]
          subprocess.run(
              [sys.executable, "-m", "pip", "install", *requirements],
              check=True,
          )
          PY
          python -c "from rf_protocols.commands.ook import OOKCommand"

      - name: Validate metadata and translations
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          root = Path("custom_components/directional_rf_fan")
          required_files = [
              Path("hacs.json"),
              Path("README.md"),
              root / "manifest.json",
              root / "services.yaml",
              root / "translations" / "en.json",
              root / "translations" / "de.json",
          ]
          missing = [str(path) for path in required_files if not path.is_file()]
          if missing:
              raise SystemExit(f"Missing required file(s): {', '.join(missing)}")

          manifest = json.loads((root / "manifest.json").read_text())
          if manifest.get("domain") != "directional_rf_fan":
              raise SystemExit("manifest.json has an unexpected domain")
          if not manifest.get("version"):
              raise SystemExit("manifest.json must define a version for HACS releases")
          if not manifest.get("config_flow"):
              raise SystemExit("manifest.json must enable config_flow")

          hacs = json.loads(Path("hacs.json").read_text())
          if not hacs.get("name"):
              raise SystemExit("hacs.json must define a name")

          for translation in sorted((root / "translations").glob("*.json")):
              json.loads(translation.read_text())
          PY
